version: 2

project_name: devbox

before:
  hooks:
    - go mod tidy

builds:
  - id: devbox-cli
    binary: devbox-cli
    main: ./cmd/devbox-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/wf-pro-dev/devbox/cmd/devbox-cli/cmd.version={{.Version}}

archives:
  - id: devbox-cli
    builds:
      - devbox-cli
    format: tar.gz
    name_template: "devbox-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "devbox-cli_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: wf-pro-dev
    name: devbox
  draft: false
  prerelease: auto
  name_template: "vi{{.Version}}"
  extra_files:
    - glob: ./install.sh
    - glob: ./docker/deploy/docker-compose.yml
    - glob: ./docker/deploy/docker-compose.backend.yml
