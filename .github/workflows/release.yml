name: Devbox Release
"on":
  push:
    tags:
    - v*
permissions:
  contents: write
  packages: write
jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      push_images: ${{ steps.check.outputs.push_images }}
    steps:
    - name: Check if minor or major bump
      id: check
      run: |
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        PATCH=$(echo "$VERSION" | cut -d. -f3)
        if [ "$PATCH" = "0" ]; then echo "push_images=true" >> "$GITHUB_OUTPUT"; else echo "push_images=false" >> "$GITHUB_OUTPUT"; fi
  cli:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    needs: version-check
    if: needs.version-check.outputs.push_images == 'true'
    environment: devbox
    runs-on: ubuntu-latest
    steps:
    - name: Log in to Local Registry
      uses: docker/login-action@v3
      with:
        registry: docker-registry.wwwill.xyz
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASS }}
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Mirror devbox/backend -> ghcr.io/wf-pro-dev/devbox/backend
      env:
        SOURCE_IMG: docker-registry.wwwill.xyz/devbox/backend
        DEST_IMG: ghcr.io/wf-pro-dev/devbox/backend
      run: |
        docker pull "${SOURCE_IMG}:${{ github.ref_name }}"
        docker tag  "${SOURCE_IMG}:${{ github.ref_name }}" "${DEST_IMG}:${{ github.ref_name }}"
        docker tag  "${SOURCE_IMG}:${{ github.ref_name }}" "${DEST_IMG}:latest"
        docker push "${DEST_IMG}:${{ github.ref_name }}"
        docker push "${DEST_IMG}:latest"
    - name: Mirror devbox/ui -> ghcr.io/wf-pro-dev/devbox/ui
      env:
        SOURCE_IMG: docker-registry.wwwill.xyz/devbox/ui
        DEST_IMG: ghcr.io/wf-pro-dev/devbox/ui
      run: |
        docker pull "${SOURCE_IMG}:${{ github.ref_name }}"
        docker tag  "${SOURCE_IMG}:${{ github.ref_name }}" "${DEST_IMG}:${{ github.ref_name }}"
        docker tag  "${SOURCE_IMG}:${{ github.ref_name }}" "${DEST_IMG}:latest"
        docker push "${DEST_IMG}:${{ github.ref_name }}"
        docker push "${DEST_IMG}:latest"
  docker-fallback:
    needs:
    - version-check
    - docker
    if: always() && needs.version-check.outputs.push_images == 'true' && (needs.docker.result == 'failure' || needs.docker.result == 'cancelled')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build & push devbox/backend -> ghcr.io/wf-pro-dev/devbox/backend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/build/Dockerfile.backend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/wf-pro-dev/devbox/backend:${{ github.ref_name }},ghcr.io/wf-pro-dev/devbox/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Build & push devbox/ui -> ghcr.io/wf-pro-dev/devbox/ui
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/build/Dockerfile.ui
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/wf-pro-dev/devbox/ui:${{ github.ref_name }},ghcr.io/wf-pro-dev/devbox/ui:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
