name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/wf-pro-dev/devbox/cmd/devbox-cli/cmd.version=${{ github.ref_name }}" \
            -o devbox-cli \
            ./cmd/devbox-cli

      - name: Package
        run: |
          ASSET="devbox-cli_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$ASSET" devbox-cli
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: devbox-cli_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Checksums
        working-directory: dist/
        run: sha256sum devbox-cli_*.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/devbox-cli_*.tar.gz
            dist/checksums.txt
            install.sh
