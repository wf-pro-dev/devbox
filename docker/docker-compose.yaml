name: devbox

services:
  # ── Go backend — API + Tailscale ────────────────────────────────────────
  backend:
    image: wwwill-1.lab:5000/devbox/backend:${DEVBOX_BACKEND_VERSION:-dev}
    container_name: devbox-backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - devbox-net
    environment:
      TS_AUTHKEY:          ${TS_AUTHKEY}
      DEVBOX_HOSTNAME:     ${DEVBOX_HOSTNAME:-devbox}
      DEVBOX_DB_PATH:      /data/devbox.db
      DEVBOX_STORAGE_PATH: /data/blobs
      DEVBOX_LOCAL_ADDR:   0.0.0.0:8888
      DEVBOX_MAX_VERSIONS: ${DEVBOX_MAX_VERSIONS:-10}
    volumes:
      - devbox-data:/data
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Svelte frontend — Nginx ──────────────────────────────────────────────
  ui:
    image: wwwill-1.lab:5000/devbox/ui:${DEVBOX_UI_VERSION:-dev}
    container_name: devbox-ui
    restart: unless-stopped
    networks:
      - devbox-net
    ports:
      - target: 80
        published: "${DEVBOX_UI_PORT:-80}"
        host_ip: "${DEVBOX_UI_BIND_IP:-127.0.0.1}"
        protocol: tcp
    environment:
      - BACKEND_URL=http://backend:8888
    depends_on:
      - backend

networks:
  devbox-net:
    driver: bridge

volumes:
  devbox-data:
    driver: local
